<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="The Tab">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1F2A3C">
<title>The Tab</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #FAF6EE;
    --paper-line: #E4DBC8;
    --ink: #1F2A3C;
    --ink-soft: #5B6472;
    --brass: #A9823D;
    --brass-deep: #8A6A2E;
    --settled: #6E8F6C;
    --owed: #B5502F;
    --card: #FFFFFF;
    --shadow: 0 1px 2px rgba(31,42,60,0.06), 0 8px 24px rgba(31,42,60,0.06);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--paper);
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 27px, rgba(31,42,60,0.035) 28px);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    padding-bottom: 40px;
    -webkit-font-smoothing: antialiased;
  }

  header {
    padding: 28px 20px 16px;
    text-align: center;
    position: relative;
  }

  header::after {
    content: "";
    display: block;
    width: 64px;
    height: 3px;
    background: var(--brass);
    margin: 14px auto 0;
    border-radius: 2px;
  }

  h1 {
    font-family: 'Fraunces', serif;
    font-optical-sizing: auto;
    font-weight: 600;
    font-size: 32px;
    margin: 0;
    letter-spacing: -0.01em;
  }

  .subtitle {
    font-size: 13px;
    color: var(--ink-soft);
    margin-top: 6px;
    font-variant: small-caps;
    letter-spacing: 0.03em;
  }

  .wrap {
    max-width: 560px;
    margin: 0 auto;
    padding: 0 16px;
  }

  /* Filter chips */
  .chips {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding: 4px 2px 18px;
    -ms-overflow-style: none;
    scrollbar-width: none;
  }
  .chips::-webkit-scrollbar { display: none; }

  .chip {
    flex: 0 0 auto;
    padding: 10px 16px;
    border-radius: 999px;
    background: var(--card);
    border: 1px solid var(--paper-line);
    font-size: 13px;
    font-weight: 600;
    color: var(--ink-soft);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    box-shadow: var(--shadow);
    transition: transform 0.15s ease, background 0.15s ease, color 0.15s ease;
    white-space: nowrap;
  }
  .chip:active { transform: scale(0.97); }
  .chip.active {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
  }
  .chip .amt {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    opacity: 0.85;
  }

  /* Add form card */
  .add-card {
    background: var(--card);
    border-radius: 16px;
    padding: 16px;
    box-shadow: var(--shadow);
    margin-bottom: 22px;
  }

  .add-row {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
  }
  .add-row:last-child { margin-bottom: 0; }

  input[type="text"], input[type="number"], select {
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    border: 1.5px solid var(--paper-line);
    border-radius: 10px;
    padding: 11px 12px;
    background: var(--paper);
    color: var(--ink);
    width: 100%;
    outline: none;
    transition: border-color 0.15s ease;
  }
  input:focus, select:focus { border-color: var(--brass); }

  .field-desc { flex: 1 1 auto; }
  .field-amount { flex: 0 0 110px; }
  .field-person { flex: 0 0 118px; }

  select { -webkit-appearance: none; appearance: none; }

  button.add-btn {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: var(--ink);
    color: var(--paper);
    font-weight: 600;
    font-size: 14px;
    letter-spacing: 0.02em;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: background 0.15s ease;
  }
  button.add-btn:active { background: var(--brass-deep); }

  /* View toggle */
  .view-toggle {
    display: flex;
    background: var(--card);
    border-radius: 12px;
    padding: 4px;
    margin-bottom: 18px;
    box-shadow: var(--shadow);
  }
  .view-toggle button {
    flex: 1;
    border: none;
    background: transparent;
    padding: 9px;
    border-radius: 8px;
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 13px;
    color: var(--ink-soft);
    cursor: pointer;
  }
  .view-toggle button.active {
    background: var(--paper);
    color: var(--ink);
  }

  /* Ledger list */
  .ledger {
    background: var(--card);
    border-radius: 16px;
    box-shadow: var(--shadow);
    overflow: hidden;
    margin-bottom: 18px;
  }

  .month-heading {
    font-family: 'Fraunces', serif;
    font-size: 14px;
    font-weight: 600;
    color: var(--ink-soft);
    padding: 14px 18px 6px;
    background: var(--card);
    border-bottom: 1px dashed var(--paper-line);
  }

  .entry {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 18px;
    border-bottom: 1px dashed var(--paper-line);
  }
  .entry:last-child { border-bottom: none; }

  .badge {
    flex: 0 0 auto;
    width: 34px;
    height: 34px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Fraunces', serif;
    font-weight: 700;
    font-size: 14px;
    color: #fff;
  }
  .badge.Andrew { background: #4C5F77; }
  .badge.Amy { background: #A9823D; }
  .badge.Ellie { background: #8A6A80; }

  .entry-main {
    flex: 1 1 auto;
    min-width: 0;
  }
  .entry-desc {
    font-size: 15px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .entry-meta {
    font-size: 12px;
    color: var(--ink-soft);
    margin-top: 2px;
  }

  .entry-amount {
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600;
    font-size: 15px;
    flex: 0 0 auto;
    margin-right: 4px;
  }

  .entry-actions {
    display: flex;
    gap: 6px;
    flex: 0 0 auto;
  }

  .icon-btn {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    border: none;
    background: var(--paper);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--ink-soft);
    transition: background 0.15s ease, color 0.15s ease;
  }
  .icon-btn:active { transform: scale(0.94); }
  .icon-btn.resolve:hover, .icon-btn.resolve.on { background: var(--settled); color: #fff; }
  .icon-btn.edit:hover { background: var(--brass); color: #fff; }
  .icon-btn.delete:hover { background: var(--owed); color: #fff; }
  .icon-btn svg { width: 16px; height: 16px; }

  /* Edit mode */
  .entry.editing {
    flex-direction: column;
    align-items: stretch;
    gap: 8px;
  }
  .edit-row { display: flex; gap: 8px; }
  .edit-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 2px; }
  .edit-actions button {
    padding: 8px 14px;
    border-radius: 8px;
    border: none;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
  }
  .edit-actions .save { background: var(--ink); color: var(--paper); }
  .edit-actions .cancel { background: var(--paper); color: var(--ink-soft); border: 1px solid var(--paper-line); }

  .empty-state {
    text-align: center;
    padding: 48px 24px;
    color: var(--ink-soft);
  }
  .empty-state .glyph {
    font-family: 'Fraunces', serif;
    font-size: 40px;
    color: var(--paper-line);
    margin-bottom: 8px;
  }
  .empty-state p { font-size: 14px; margin: 0; }

  .total-strip {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 4px 4px 16px;
  }
  .total-strip .label {
    font-size: 12px;
    color: var(--ink-soft);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .total-strip .value {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 20px;
    font-weight: 600;
  }
</style>
</head>
<body>

<header>
  <h1>The Tab</h1>
  <div class="subtitle">On Andrew's card</div>
</header>

<div class="wrap">
  <div class="chips" id="chips"></div>
  <div class="total-strip" id="totalStrip"></div>

  <div class="add-card">
    <div class="add-row">
      <input type="text" id="descInput" class="field-desc" placeholder="What was bought?">
    </div>
    <div class="add-row">
      <input type="number" id="amountInput" class="field-amount" placeholder="AED" inputmode="decimal" step="0.01">
      <select id="personInput" class="field-person">
        <option>Andrew</option>
        <option>Amy</option>
        <option>Ellie</option>
      </select>
    </div>
    <div class="add-row">
      <button class="add-btn" id="addBtn">Add to the tab</button>
    </div>
  </div>

  <div class="view-toggle">
    <button id="tabActive" class="active">Active</button>
    <button id="tabHistory">History</button>
  </div>

  <div class="ledger" id="ledger"></div>
</div>

<script>
const STORAGE_KEY = 'the-tab-entries-v1';
const PEOPLE = ['Andrew', 'Amy', 'Ellie'];

let entries = [];
let currentFilter = 'All';
let currentView = 'active'; // 'active' | 'history'
let editingId = null;

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    entries = raw ? JSON.parse(raw) : [];
  } catch (e) {
    entries = [];
  }
}

function save() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
  } catch (e) {
    console.error('Could not save', e);
  }
}

function uid() {
  return 'e' + Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}

function formatAED(n) {
  const num = Number(n) || 0;
  return 'AED ' + num.toLocaleString('en-AE', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function formatDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
}

function monthLabel(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('en-GB', { month: 'long', year: 'numeric' });
}

function initials(name) {
  return name.slice(0, 1);
}

function computeTotals(list) {
  const totals = { All: 0, Andrew: 0, Amy: 0, Ellie: 0 };
  list.forEach(e => {
    totals.All += Number(e.amount) || 0;
    totals[e.person] += Number(e.amount) || 0;
  });
  return totals;
}

function currentScopeEntries() {
  return entries.filter(e => currentView === 'active' ? !e.resolved : e.resolved);
}

function renderChips() {
  const scoped = currentScopeEntries();
  const totals = computeTotals(scoped);
  const chipsEl = document.getElementById('chips');
  chipsEl.innerHTML = '';
  ['All', ...PEOPLE].forEach(name => {
    const chip = document.createElement('div');
    chip.className = 'chip' + (currentFilter === name ? ' active' : '');
    chip.innerHTML = `<span>${name}</span><span class="amt">${formatAED(totals[name])}</span>`;
    chip.onclick = () => { currentFilter = name; renderAll(); };
    chipsEl.appendChild(chip);
  });
}

function renderTotalStrip() {
  const scoped = currentScopeEntries().filter(e => currentFilter === 'All' || e.person === currentFilter);
  const total = scoped.reduce((s, e) => s + (Number(e.amount) || 0), 0);
  const label = currentFilter === 'All'
    ? (currentView === 'active' ? 'Outstanding, everyone' : 'Settled, everyone')
    : (currentView === 'active' ? `${currentFilter} owes` : `${currentFilter} settled`);
  document.getElementById('totalStrip').innerHTML = `
    <div class="label">${label}</div>
    <div class="value">${formatAED(total)}</div>
  `;
}

function entryRowHTML(e) {
  if (editingId === e.id) return editRowHTML(e);
  const resolveIcon = currentView === 'active'
    ? `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>`
    : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></svg>`;
  const metaText = currentView === 'active'
    ? formatDate(e.dateAdded)
    : `Settled ${formatDate(e.resolvedDate)}`;

  return `
    <div class="entry" data-id="${e.id}">
      <div class="badge ${e.person}">${initials(e.person)}</div>
      <div class="entry-main">
        <div class="entry-desc">${escapeHtml(e.desc)}</div>
        <div class="entry-meta">${e.person} &middot; ${metaText}</div>
      </div>
      <div class="entry-amount">${formatAED(e.amount)}</div>
      <div class="entry-actions">
        <button class="icon-btn resolve ${e.resolved ? 'on' : ''}" title="${currentView === 'active' ? 'Mark resolved' : 'Move back to active'}" onclick="toggleResolve('${e.id}')">${resolveIcon}</button>
        <button class="icon-btn edit" title="Edit" onclick="startEdit('${e.id}')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"></path><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"></path></svg>
        </button>
        <button class="icon-btn delete" title="Delete" onclick="deleteEntry('${e.id}')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path><path d="M10 11v6"></path><path d="M14 11v6"></path><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"></path></svg>
        </button>
      </div>
    </div>
  `;
}

function editRowHTML(e) {
  const personOptions = PEOPLE.map(p => `<option ${p === e.person ? 'selected' : ''}>${p}</option>`).join('');
  return `
    <div class="entry editing" data-id="${e.id}">
      <div class="edit-row">
        <input type="text" id="edit-desc-${e.id}" value="${escapeHtml(e.desc)}" placeholder="Description">
      </div>
      <div class="edit-row">
        <input type="number" id="edit-amount-${e.id}" class="field-amount" value="${e.amount}" step="0.01">
        <select id="edit-person-${e.id}" class="field-person">${personOptions}</select>
      </div>
      <div class="edit-actions">
        <button class="cancel" onclick="cancelEdit()">Cancel</button>
        <button class="save" onclick="saveEdit('${e.id}')">Save</button>
      </div>
    </div>
  `;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function renderLedger() {
  const ledgerEl = document.getElementById('ledger');
  let list = currentScopeEntries().filter(e => currentFilter === 'All' || e.person === currentFilter);

  if (list.length === 0) {
    ledgerEl.innerHTML = `
      <div class="empty-state">
        <div class="glyph">&mdash;</div>
        <p>${currentView === 'active' ? 'Nothing outstanding here yet.' : 'No settled items yet.'}</p>
      </div>
    `;
    return;
  }

  if (currentView === 'active') {
    list = list.slice().sort((a, b) => new Date(b.dateAdded) - new Date(a.dateAdded));
    ledgerEl.innerHTML = list.map(entryRowHTML).join('');
  } else {
    list = list.slice().sort((a, b) => new Date(b.resolvedDate) - new Date(a.resolvedDate));
    const groups = {};
    list.forEach(e => {
      const key = monthLabel(e.resolvedDate);
      if (!groups[key]) groups[key] = [];
      groups[key].push(e);
    });
    ledgerEl.innerHTML = Object.entries(groups).map(([month, items]) => `
      <div class="month-heading">${month}</div>
      ${items.map(entryRowHTML).join('')}
    `).join('');
  }
}

function renderAll() {
  renderChips();
  renderTotalStrip();
  renderLedger();
  document.getElementById('tabActive').classList.toggle('active', currentView === 'active');
  document.getElementById('tabHistory').classList.toggle('active', currentView === 'history');
}

function addEntry() {
  const descEl = document.getElementById('descInput');
  const amountEl = document.getElementById('amountInput');
  const personEl = document.getElementById('personInput');

  const desc = descEl.value.trim();
  const amount = parseFloat(amountEl.value);
  const person = personEl.value;

  if (!desc) { descEl.focus(); return; }
  if (!amount || amount <= 0) { amountEl.focus(); return; }

  entries.push({
    id: uid(),
    desc,
    amount,
    person,
    dateAdded: new Date().toISOString(),
    resolved: false,
    resolvedDate: null
  });

  save();
  descEl.value = '';
  amountEl.value = '';
  currentView = 'active';
  renderAll();
  descEl.focus();
}

function toggleResolve(id) {
  const e = entries.find(x => x.id === id);
  if (!e) return;
  e.resolved = !e.resolved;
  e.resolvedDate = e.resolved ? new Date().toISOString() : null;
  save();
  renderAll();
}

function startEdit(id) {
  editingId = id;
  renderLedger();
}

function cancelEdit() {
  editingId = null;
  renderLedger();
}

function saveEdit(id) {
  const e = entries.find(x => x.id === id);
  if (!e) return;
  const desc = document.getElementById(`edit-desc-${id}`).value.trim();
  const amount = parseFloat(document.getElementById(`edit-amount-${id}`).value);
  const person = document.getElementById(`edit-person-${id}`).value;

  if (!desc || !amount || amount <= 0) return;

  e.desc = desc;
  e.amount = amount;
  e.person = person;

  editingId = null;
  save();
  renderAll();
}

function deleteEntry(id) {
  if (!confirm('Delete this item? This cannot be undone.')) return;
  entries = entries.filter(e => e.id !== id);
  save();
  renderAll();
}

document.getElementById('addBtn').addEventListener('click', addEntry);
document.getElementById('amountInput').addEventListener('keydown', (ev) => {
  if (ev.key === 'Enter') addEntry();
});
document.getElementById('descInput').addEventListener('keydown', (ev) => {
  if (ev.key === 'Enter') document.getElementById('amountInput').focus();
});
document.getElementById('tabActive').addEventListener('click', () => {
  currentView = 'active';
  editingId = null;
  renderAll();
});
document.getElementById('tabHistory').addEventListener('click', () => {
  currentView = 'history';
  editingId = null;
  renderAll();
});

load();
renderAll();
</script>

</body>
</html>
